name: Test MyBotX on clean Windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      - name: Check Python version
        run: python --version

      - name: Check ADB exists in BOT_APPLICATIONS
        run: |
          if (Test-Path "BOT_APPLICATIONS\platform-tools\adb.exe") {
            Write-Host "[OK] ADB found"
          } else {
            Write-Error "[FAIL] ADB not found in BOT_APPLICATIONS\platform-tools\"
            exit 1
          }

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r CORE/requirements.txt

      - name: Check all packages importable
        run: |
          python -c "import psutil; print('[OK] psutil')"
          python -c "import PIL; print('[OK] Pillow')"
          python -c "import cv2; print('[OK] opencv')"
          python -c "import numpy; print('[OK] numpy')"
          python -c "import pyautogui; print('[OK] pyautogui')"

      - name: Check CORE/main.py exists
        run: |
          if (Test-Path "CORE\main.py") {
            Write-Host "[OK] CORE\main.py found"
          } else {
            Write-Error "[FAIL] CORE\main.py not found"
            exit 1
          }

      - name: Check requirements.py runs without error
        run: |
          cd CORE
          python check_requirements.py
